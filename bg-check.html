  .fail { border-color: #e74c3c; }
  .status { font-size: 0.65rem; font-weight: bold; margin-top: 2px; }
  .status.ok { color: #2ecc71; }

function removeBg(imgEl, tolerance) {
  if (!imgEl.naturalWidth) return false;
  try {
    const c = document.createElement('canvas');
    const w = c.width = imgEl.naturalWidth, h = c.height = imgEl.naturalHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(imgEl, 0, 0);
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    if (data[3] === 0) return true; // already transparent
    const bgR = data[0], bgG = data[1], bgB = data[2];
    const brightness = bgR + bgG + bgB;
    const tol = tolerance !== undefined ? tolerance : brightness > 600 ? 40 : brightness < 90 ? 30 : 22;
    const visited = new Uint8Array(w * h);
    const queue = new Int32Array(w * h);
    let qHead = 0, qTail = 0;
    [[0,0],[w-1,0],[0,h-1],[w-1,h-1]].forEach(([x,y]) => {
      const idx = y*w+x;
      if (!visited[idx]) { visited[idx]=1; queue[qTail++]=idx; }
    });
    let removed = 0;
    while (qHead < qTail) {
      const idx = queue[qHead++];
      const pi = idx*4; data[pi+3]=0; removed++;
      const x=idx%w, y=(idx/w)|0;
      for (const ni of [x>0?idx-1:-1, x<w-1?idx+1:-1, y>0?idx-w:-1, y<h-1?idx+w:-1]) {
        if (ni<0||visited[ni]) continue;
        const npi=ni*4;
        if (data[npi+3]===0){visited[ni]=1;continue;}
        if (Math.abs(data[npi]-bgR)+Math.abs(data[npi+1]-bgG)+Math.abs(data[npi+2]-bgB)<tol*3){visited[ni]=1;queue[qTail++]=ni;}
      }
    }
    ctx.putImageData(imageData, 0, 0);
    imgEl.src = c.toDataURL('image/png');
    return removed > 100; // true = background was removed
  } catch(e) { return false; }
}

const grid = document.getElementById('grid');
images.forEach(src => {
  const item = document.createElement('div');
  item.className = 'item';
  const img = document.createElement('img');
  const label = document.createElement('div');
  label.className = 'label';
  const name = src.split('/').pop();
  const status = document.createElement('div');
  status.className = 'status';
  label.textContent = name;
  label.appendChild(status);
  img.onload = function() {
    const hadBg = removeBg(this);
    if (hadBg) {
      item.classList.add('ok');
      status.className = 'status ok';
      status.textContent = '✓ fundo removido';
    } else {
      item.classList.add('ok');
      status.className = 'status ok';
      status.textContent = '✓ já transparente';
    }
  };
  img.onclick = () => window.open(img.src, '_blank');
  img.style.cursor = 'pointer';
  img.src = src;
  item.appendChild(img);
  item.appendChild(label);
  grid.appendChild(item);
});
