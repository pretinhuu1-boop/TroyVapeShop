<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E94560"/>
      <stop offset="100%" style="stop-color:#D63050"/>
    </linearGradient>
    <linearGradient id="phone-icon-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E94560"/>
      <stop offset="100%" style="stop-color:#C72847"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Phone Icon Mark -->
  <g transform="translate(10, 10)">
    <!-- Outer phone body -->
    <rect x="0" y="0" width="32" height="58" rx="8" ry="8" fill="url(#phone-icon-grad)" opacity="0.9"/>
    <!-- Screen -->
    <rect x="3" y="3" width="26" height="52" rx="6" ry="6" fill="#0D0D14"/>
    <!-- Screen reflection -->
    <rect x="3" y="3" width="26" height="26" rx="6" ry="3" fill="white" opacity="0.04"/>
    <!-- Alpha "A" on screen -->
    <text x="16" y="38" text-anchor="middle" fill="white" font-family="SF Pro Display, -apple-system, Inter, sans-serif" font-size="20" font-weight="800" letter-spacing="-1">A</text>
    <!-- Notch -->
    <rect x="10" y="4" width="12" height="4" rx="2" ry="2" fill="#0D0D14"/>
    <!-- Home indicator -->
    <rect x="10" y="51" width="12" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Brand Text -->
  <text x="52" y="50" fill="white" font-family="SF Pro Display, -apple-system, Inter, Helvetica, sans-serif" font-size="36" font-weight="800" letter-spacing="-1.5">
    Alpha<tspan fill="url(#accent-grad)">Phone</tspan>
  </text>

  <!-- Tagline -->
  <text x="54" y="67" fill="rgba(255,255,255,0.4)" font-family="SF Pro Display, -apple-system, Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="3" text-transform="uppercase">
    iPHONE CERTIFICADO
  </text>
</svg>