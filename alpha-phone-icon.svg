<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0D0D14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E94560"/>
      <stop offset="100%" style="stop-color:#D63050"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="40" fill="url(#bg-grad)"/>

  <!-- Phone body -->
  <rect x="24" y="14" width="32" height="52" rx="8" ry="8" fill="url(#accent)" opacity="0.95"/>
  <!-- Screen -->
  <rect x="27" y="17" width="26" height="46" rx="6" ry="6" fill="#0D0D14"/>
  <!-- Screen subtle gradient -->
  <rect x="27" y="17" width="26" height="23" rx="6" ry="3" fill="white" opacity="0.03"/>
  <!-- "A" letter -->
  <text x="40" y="48" text-anchor="middle" fill="white" font-family="SF Pro Display, -apple-system, Inter, sans-serif" font-size="22" font-weight="800" letter-spacing="-1">A</text>
  <!-- Notch -->
  <rect x="34" y="18" width="12" height="3.5" rx="1.75" fill="#0D0D14"/>
  <!-- Home indicator -->
  <rect x="34" y="59" width="12" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Subtle glow ring -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.3"/>
</svg>